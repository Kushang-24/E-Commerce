<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assest/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assest/css/style.css">
    <link rel="stylesheet" href="assest/css/media.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>E-Commerce</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand fw-bolder py-lg-4 ms-5" href="#">E-Commerce</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item me-lg-4  position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder py-lg-4" href="#" role="button" data-bs-toggle=""
                            aria-haspopup="true" aria-expanded="false">
                            Home
                        </a>
                    </li>
                    <li class="nav-item me-lg-4 position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder py-lg-4" href="products.html" role="button">
                            Products
                        </a>
                    </li>
                    <li class="nav-item me-lg-4 position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder py-lg-4" href="#" role="button">
                            Mens
                        </a>
                    </li>
                    <li class="nav-item me-lg-4 position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder py-lg-4" href="#" role="button">Womens
                        </a>
                    </li>
                    <li class="nav-item me-lg-4 position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder -toggle py-lg-4" href="#" role="button" data-bs-toggle=""
                            aria-haspopup="true" aria-expanded="false">
                            Baby Collection
                        </a>
                    </li>
                    <li class="nav-item me-lg-4 position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder -toggle py-lg-4" href="#" role="button" data-bs-toggle=""
                            aria-haspopup="true" aria-expanded="false">
                            Blog
                        </a>
                    </li>
                    <li class="nav-item me-lg-4 position-static" aria-expanded="false">
                        <a class="nav-link fw-bolder py-lg-4" href="#" role="button" data-bs-toggle=""
                            aria-haspopup="true" aria-expanded="false">
                            contact
                        </a>
                    </li>
                </ul>
                <ul class="list-unstyled mb-0 me-4 d-flex align-items-center">
                    <li class="d-inline-block">
                        <a class="btn px-2 text-decoration-none navbar-toggler border-0 d-flex align-items-center collapsed"
                            data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                            aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                            <div class="input-group">
                                <input type="text" class="form-control bg-transparent border-dark rounded"
                                    placeholder="search" aria-label="search" aria-describedby="button-addon2"><i
                                    class="bi bi-search"></i>
                            </div>
                        </a>
                    </li>
                    <li class="ms-1 d-inline-block">
                        <a class="btn px-3 text-decoration-none navbar-toggler border-0 d-flex align-items-center collapsed"
                            data-pr-search="">
                            <i class="bi bi-heart"></i>
                        </a>
                    </li>
                    <li class="ms-1 d-inline-block">
                        <a class="btn px-3 text-decoration-none navbar-toggler border-0 d-flex align-items-center collapsed"
                            data-pr-search="">
                            <i class="bi bi-person"></i>
                        </a>
                    </li>
                    <li class="ms-1 d-inline-block">
                        <a class="btn px-3 text-decoration-none navbar-toggler border-0 d-flex align-items-center collapsed"
                            data-pr-search="">
                            <i class="bi bi-cart-dash"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <section id="slider-home">
        <div class="container-custom">
            <div id="carouselExampleAutoplaying" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="assest/images/banner-1.jpg" height="900px" class="d-block w-100 position-relative">
                        <div
                            class="container position-absolute top-0 d-flex h-100 align-items-start flex-column justify-content-center">
                            <p class="title-small text-white opacity-75 mb-0  text-uppercase font-monospace fw-bold"
                                style="transition-duration: 0ms; transform: translate3d(-100px, 0px, 0px); margin-left: 16%;">
                                Everythig you need</p>
                            <h2 class="display-3 tracking-wide fw-bold text-uppercase tracking-wide text-white"
                                style="transition-duration: 0ms; transform: translate3d(100px, 0px, 0px);">
                                summer
                                <span class="text-outline-light text-white">ESSENTIALS</span>
                            </h2>
                            <div
                                style="transition-duration: 0ms; transform: translate3d(0px, -25px, 0px); margin-left: 8%;">
                                <a href="" class="btn btn-psuedo text-white mt-3" role="button">Shop new arrivals</a>
                            </div>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="assest/images/banner-2.jpg" height="900px" class="d-block w-100 position-relative">
                        <div
                            class="container position-absolute top-0 d-flex h-100 align-items-start flex-column justify-content-center">
                            <p class="title-small text-dark text-uppercase font-monospace fw-bold opacity-75 mb-0"
                                style="transition-duration: 0ms; transform: translate3d(-100px, 0px, 0px); margin-left: 16%;">
                                Spring Collection
                            </p>
                            <h2 class="display-3 tracking-wide fw-bold text-uppercase tracking-wide text-white"
                                style="transition-duration: 0ms; transform: translate3d(100px, 0px, 0px);">
                                Adidas
                                <span class="text-outline-light text-white">SS20</span>
                            </h2>
                            <div
                                style="transition-duration: 0ms; transform: translate3d(0px, -25px, 0px); margin-left: 8%;">
                                <a href="" class="btn btn-psuedo text-white mt-3" role="button">Shop Latest Adidas</a>
                            </div>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="assest/images/banner-4.jpg" height="900px" class="d-block w-100 position-relative">
                        <div
                            class="container position-absolute top-0 d-flex h-100 align-items-start flex-column justify-content-center">
                            <p class="title-small text-white opacity-75 mb-0  text-uppercase font-monospace fw-bold"
                                style="transition-duration: 0ms; transform: translate3d(-100px, 0px, 0px); margin-left: 16%;">
                                Just Do it</p>
                            <h2 class="display-3 tracking-wide fw-bold text-uppercase tracking-wide text-white"
                                style="transition-duration: 0ms; transform: translate3d(100px, 0px, 0px);">
                                Nike
                                <span class="text-outline-light text-white">SS21</span>
                            </h2>
                            <div
                                style="transition-duration: 0ms; transform: translate3d(0px, -25px, 0px); margin-left: 8%;">
                                <a href="" class="btn btn-psuedo text-white mt-3" role="button">Shop Latest Nike</a>
                            </div>
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleAutoplaying"
                        data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
